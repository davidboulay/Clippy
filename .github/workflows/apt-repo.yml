name: APT repository

# Publish/refresh the GitHub-Pages-hosted APT repository (davidboulay.github.io/
# Clippy) whenever a release is published, so `sudo apt upgrade` picks up new
# versions. Can also be run manually. The repo is rebuilt from *all* release
# .debs each time, so it stays cumulative and re-runs are idempotent.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apt-repo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="$(mktemp -d)"; chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          printf '%s' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Collect every release .deb
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p debs
          for tag in $(gh release list --limit 100 --json tagName -q '.[].tagName'); do
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
              --pattern '*.deb' --dir debs --skip-existing || true
          done
          ls -1 debs

      - name: Build the signed flat repo
        run: |
          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}" \
            ./packaging/apt/build-repo.sh debs public
          touch public/.nojekyll

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd public
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "APT repo: ${GITHUB_REF_NAME:-manual} ($(date -u +%FT%TZ))"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" gh-pages

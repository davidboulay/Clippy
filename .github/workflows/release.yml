name: Release

# Push a tag like v0.2.0 to build the Linux .deb + macOS .dmg and publish a
# GitHub Release with both artifacts.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-3.0 gir1.2-gdkpixbuf-2.0 fakeroot

      - name: Build .deb
        run: ./packaging/deb/build-deb.sh

      - name: Publish release with the .deb
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.deb \
            --title "${GITHUB_REF_NAME}" --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist/*.deb --clobber

  macos:
    runs-on: macos-latest
    # Run after the .deb job so the release already exists; this job only
    # uploads the .dmg to it. The .app is ad-hoc signed (no Developer ID), so
    # Gatekeeper still shows "unidentified developer" on first launch.
    needs: deb
    steps:
      - uses: actions/checkout@v4

      - name: Build .app + .dmg
        run: ./packaging/macos/build-app.sh --dmg

      - name: Upload the .dmg to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The deb job already created the release; upload with --clobber so
          # re-runs are idempotent. Fall back to create if it's somehow missing.
          gh release upload "${GITHUB_REF_NAME}" dist/*.dmg --clobber \
          || gh release create "${GITHUB_REF_NAME}" dist/*.dmg \
               --title "${GITHUB_REF_NAME}" --generate-notes
